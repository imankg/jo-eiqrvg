name: Cloud Downloader
on:
  workflow_dispatch:
    inputs:
      url:
        required: true
      chat_id:
        required: true
      message_id:
        required: true
      custom_name:
        required: true
      password:
        required: false
        default: 'none'
      worker_url:
        required: true
      unlock_secret:
        required: true
      max_size:
        required: true
        default: '400'
      upload_target:
        required: true
        default: 'release' # می‌تواند code یا release باشد

jobs:
  download-and-process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3 # برای دسترسی به سورس کد جهت پوش کردن در پوشه dl

      - name: Notify - Starting
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/editMessageText" \
          -d chat_id="${{ github.event.inputs.chat_id }}" -d message_id="${{ github.event.inputs.message_id }}" \
          -d text="📥 در حال دانلود فایل(ها) در سرور..."

      - name: Setup Tools & Cookies
        run: |
          sudo apt-get update && sudo apt-get install -y p7zip-full nodejs python3-pip
          sudo python3 -m pip install --break-system-packages -U --pre yt-dlp
          cat << 'EOF' > cookies.txt
          ${{ secrets.YT_COOKIES }}
          EOF

      - name: Download Multiple Files
        run: |
          CUSTOM_NAME="${{ github.event.inputs.custom_name }}"
          MAX_SIZE="${{ github.event.inputs.max_size }}"
          mkdir -p "$CUSTOM_NAME"
          cd "$CUSTOM_NAME"
          
          IFS=',' read -ra URL_ARRAY <<< "${{ github.event.inputs.url }}"
          COUNTER=1
          for URL in "${URL_ARRAY[@]}"; do
            URL=$(echo "$URL" | xargs)
            if [[ "$URL" == *"youtube.com"* ]] || [[ "$URL" == *"youtu.be"* ]] || [[ "$URL" == *"twitter.com"* ]] || [[ "$URL" == *"instagram.com"* ]]; then
              yt-dlp --cookies ../cookies.txt \
              --extractor-args "youtube:player_client=android,web" \
              -S "res:480" \
              -f "bv*[filesize_approx<=?${MAX_SIZE}M]+ba/b[filesize_approx<=?${MAX_SIZE}M]/wv*+ba/w" \
              -o "dl_${COUNTER}_%(ext)s" "$URL"
            else
              wget -O "dl_${COUNTER}.tmp" "$URL" || true
            fi
            ((COUNTER++))
          done
          cd ..
          echo "FOLDER_NAME=$CUSTOM_NAME" >> $GITHUB_ENV

      - name: Compress and Encrypt (with split for Code)
        run: |
          TARGET="${{ github.event.inputs.upload_target }}"
          PASS_ARG=""
          if [ "${{ github.event.inputs.password }}" != "none" ]; then
            PASS_ARG="-p${{ github.event.inputs.password }} -mhe=on"
          fi
          
          if [ "$TARGET" == "code" ]; then
            # تکه‌تکه کردن به پارت‌های 95 مگابایتی برای دور زدن لیمیت 100 مگ گیت‌هاب
            7z a -v95m $PASS_ARG "${{ env.FOLDER_NAME }}.7z" "./${{ env.FOLDER_NAME }}/*"
            PARTS_COUNT=$(ls ${{ env.FOLDER_NAME }}.7z* | wc -l)
            echo "FILE_PATTERN=${{ env.FOLDER_NAME }}.7z*" >> $GITHUB_ENV
            echo "PARTS=$PARTS_COUNT" >> $GITHUB_ENV
          else
            # فشرده سازی عادی برای ریلیس
            7z a $PASS_ARG "${{ env.FOLDER_NAME }}.7z" "./${{ env.FOLDER_NAME }}/*"
            echo "FILE_PATTERN=${{ env.FOLDER_NAME }}.7z" >> $GITHUB_ENV
            echo "PARTS=1" >> $GITHUB_ENV
          fi

      - name: Upload to Release
        if: ${{ github.event.inputs.upload_target == 'release' }}
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.FILE_PATTERN }}
          tag_name: "dl-${{ github.run_id }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Code (Git Push)
        if: ${{ github.event.inputs.upload_target == 'code' }}
        run: |
          mkdir -p dl
          mv ${{ env.FILE_PATTERN }} dl/
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main
          git add dl/*
          git commit -m "Add files: ${{ env.FOLDER_NAME }} (${{ env.PARTS }} parts) [skip ci]"
          git push

      - name: Notify - Done
        run: |
          if [ "${{ github.event.inputs.upload_target }}" == "release" ]; then
            LINK="https://github.com/${{ github.repository }}/releases/download/dl-${{ github.run_id }}/${{ env.FILE_PATTERN }}"
            MSG="✅ فایل در Release آپلود شد.\n🔗 لینک: $LINK"
          else
            LINK="https://github.com/${{ github.repository }}/tree/main/dl"
            MSG="✅ فایل در پوشه کد (dl) در ${NUMBER_OF_PARTS} پارت آپلود شد.\n🔗 لینک پوشه: $LINK"
          fi
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_TOKEN }}/editMessageText" \
          -d chat_id="${{ github.event.inputs.chat_id }}" -d message_id="${{ github.event.inputs.message_id }}" \
          -d text="$MSG"

      - name: Unlock User & Update Final Cost
        if: always()
        run: |
          curl -s -X POST "${{ github.event.inputs.worker_url }}" \
          -H "Content-Type: application/json" \
          -d '{"action":"unlock", "secret":"${{ github.event.inputs.unlock_secret }}", "chat_id":"${{ github.event.inputs.chat_id }}", "parts":"${{ env.PARTS }}"}'
